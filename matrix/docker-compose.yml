services:
  # ─── Reverse Proxy (auto-TLS via Let's Encrypt) ─────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - synapse
    networks:
      - matrix

  # ─── Matrix Homeserver ──────────────────────────────────────
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    volumes:
      - ./synapse:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - matrix

  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matrix

  # ─── WhatsApp Bridge ────────────────────────────────────────
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: mautrix-whatsapp
    restart: unless-stopped
    volumes:
      - ./bridges/whatsapp:/data
    depends_on:
      synapse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - matrix

  # ─── Instagram Bridge (mautrix-meta in instagram mode) ─────
  mautrix-meta:
    image: dock.mau.dev/mautrix/meta:latest
    container_name: mautrix-meta
    restart: unless-stopped
    volumes:
      - ./bridges/meta:/data
    depends_on:
      synapse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - matrix

  # ─── LinkedIn Bridge ────────────────────────────────────────
  mautrix-linkedin:
    image: dock.mau.dev/mautrix/linkedin:latest
    container_name: mautrix-linkedin
    restart: unless-stopped
    volumes:
      - ./bridges/linkedin:/data
    depends_on:
      synapse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - matrix

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  matrix:
    driver: bridge
